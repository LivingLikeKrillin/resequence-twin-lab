spring.application.name=resequence-twin-control

# Kafka — host access (Docker: 19092 external listener)
spring.kafka.bootstrap-servers=localhost:19092
spring.kafka.consumer.group-id=resequence-twin-control
spring.kafka.consumer.auto-offset-reset=earliest

# PBS live-stream consumer (S2)
# Topic that PbsEventListener subscribes to
pbs.topic=pbs-events
# Lane topology: comma-separated id:capacity pairs (must match benchmark canonical topology)
pbs.lanes=L1:10,L2:10,L3:10

# Eclipse Ditto — pre-authentication (ENABLE_PRE_AUTHENTICATION=true in Docker)
ditto.base-url=http://localhost:18080
ditto.auth-header=nginx:ditto

# PBS live twin projection (S4) — scheduled PBS→Ditto projection decoupled from Kafka consumer
pbs.twin.enabled=true
pbs.twin.project-interval-ms=1000

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

server.port=8081

# PBS drift seam (S5) — detect config + behavioral drift; advisory only, no write-back
pbs.drift.enabled=true
pbs.drift.interval-ms=1000
pbs.drift.ewma-alpha=0.3
pbs.drift.residual-threshold=2.0
# Live source: sim (offline deterministic) | opcua (milo, user-run real demo)
pbs.drift.source=sim
pbs.drift.opcua.endpoint=opc.tcp://localhost:4840

# Recipe-setpoint drift (integration PoV) — reads koshei's shared Milo sim Recipe nodes vs koshei canonical.
# Default OFF so existing PBS drift + tests are unaffected; the integration gate enables it.
# NOTE: recipe drift is computed inside DriftMonitor.tick(), which is gated on pbs.drift.enabled — so it
# only takes effect while pbs.drift.enabled=true (the default).
pbs.drift.recipe.enabled=false
pbs.drift.recipe.canonical-path=
# Endpoint override; blank -> use the endpoint field in recipe-setpoints.yaml (opc.tcp://localhost:48400).
pbs.drift.recipe.opcua.endpoint=

# koshei governance subscription (outbound-emit PoV) — consume koshei's Sparkplug B governance Edge Node
# to annotate setpoint drift findings DETECTED -> RECONCILING -> CLEARED with provenance (which run).
# Default OFF so existing deployments/tests are unaffected; the outbound-emit gate enables it.
koshei.subscribe.enabled=false
koshei.subscribe.mqtt-url=tcp://localhost:1883
koshei.subscribe.group=Koshei
koshei.subscribe.edge=Governance
